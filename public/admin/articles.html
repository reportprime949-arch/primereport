<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Articles - PrimeReport</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/prime.css">
    <link rel="stylesheet" href="../css/admin-modern.css">
    <script type="module" src="../js/auth-check.js"></script>
    <script src="../js/sidebar.js" defer></script>
    <script type="module" src="../js/toastManager.js"></script>
</head>
<body class="admin-body">
    <div class="admin-layout">
        <div class="sidebar-overlay" id="sidebar-overlay" onclick="toggleSidebar()"></div>
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="logo">
                <img src="../logo.png" alt="PrimeReport" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <h2 style="display:none;">Prime<span>Report</span></h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
                    <li><a href="articles.html"><i class="fas fa-newspaper"></i> <span>Articles</span></a></li>
                    <li><a href="categories.html"><i class="fas fa-folder"></i> <span>Categories</span></a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> <span>Users</span></a></li>
                    <li><a href="queue.html"><i class="fas fa-list-check"></i> <span>Article Queue</span></a></li>
                    <li><a href="analytics.html"><i class="fas fa-chart-line"></i> <span>Analytics</span></a></li>
                    <li><a href="ads.html"><i class="fas fa-rectangle-ad"></i> <span>Advertisements</span></a></li>
                    <li><a href="rss.html"><i class="fas fa-rss"></i> <span>RSS Controls</span></a></li>
                    <li><a href="ai-settings.html"><i class="fas fa-robot"></i> <span>AI Engine</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-gear"></i> <span>Settings</span></a></li>
                    <li class="mt-5"><a href="#" id="logout-btn"><i class="fas fa-right-from-bracket"></i> <span>Logout</span></a></li>
                </ul>
            </nav>
        </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <div style="display:flex; align-items:center;">
                <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-left">
                    <p>Content Management</p>
                    <h2>Articles</h2>
                </div>
            </div>
            <div class="header-right">
                <button class="header-icon-btn" id="sound-toggle-btn" title="Toggle Sound">
                    <i class="fas fa-volume-up"></i>
                </button>
                <button class="header-icon-btn" title="Notifications" onclick="window.location.href='notifications.html'">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge" id="global-notif-badge" style="display:none;">0</span>
                </button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff&bold=true&size=64" alt="Avatar">
                    <span>Administrator</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <section class="admin-content">
            <div class="content-card">
                <div class="card-header" style="flex-wrap:wrap; gap:14px;">
                    <div class="filters" style="display:flex; gap:10px; align-items:center; flex:1; flex-wrap:wrap;">
                        <div style="position:relative; flex:1; min-width:180px; max-width:300px;">
                            <i class="fas fa-search" style="position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-muted); font-size:0.8rem;"></i>
                            <input type="text" id="search-input" class="form-input" placeholder="Search titles..." style="padding-left:34px;" onkeyup="filterArticles()">
                        </div>
                        <select id="category-filter" class="form-input" style="width:auto; min-width:140px;" onchange="filterArticles()">
                            <option value="">All Categories</option>
                        </select>
                        <input type="date" id="date-filter" class="form-input" style="width:auto;" onchange="filterArticles()">
                    </div>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="openCreateModal()">
                            <i class="fas fa-plus"></i> Compose New
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Article Title</th>
                                <th>Category</th>
                                <th>Published At</th>
                                <th>Author</th>
                                <th>Status</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="articles-table-body">
                            <!-- Injected -->
                        </tbody>
                    </table>
                </div>

                <div class="pagination" id="pagination-controls" style="margin-top:20px; display:flex; justify-content:center; gap:6px;">
                    <!-- Injected -->
                </div>
            </div>
        </section>
    </main>
</div>

    <!-- Modal for Create/Edit -->
    <div id="article-modal" class="modal" style="display:none; position:fixed; inset:0; z-index:2000; align-items:center; justify-content:center;">
        <div class="modal-content" style="width:90%; max-width:680px; background:white; position:relative;">
            <div class="modal-header" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:22px;">
                <h3 id="modal-title" style="margin:0; font-size:1.05rem; font-weight:700;">Compose Article</h3>
                <button onclick="closeModal()" style="background:none; border:none; font-size:1.4rem; cursor:pointer; color:var(--text-muted); line-height:1;">&times;</button>
            </div>
            <form id="article-form">
                <input type="hidden" id="edit-id">
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="display:block; margin-bottom:6px; font-weight:600; font-size:0.82rem; color:var(--text-secondary);">Headline</label>
                    <input type="text" id="form-title" required class="form-input">
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:18px;">
                    <div class="form-group">
                        <label style="display:block; margin-bottom:6px; font-weight:600; font-size:0.82rem; color:var(--text-secondary);">Category</label>
                        <select id="form-category" class="form-input" required>
                            <!-- Injected -->
                        </select>
                    </div>
                    <div class="form-group">
                        <label style="display:block; margin-bottom:6px; font-weight:600; font-size:0.82rem; color:var(--text-secondary);">Image URL</label>
                        <input type="text" id="form-image" placeholder="https://..." class="form-input">
                    </div>
                </div>
                <div class="form-group" style="margin-bottom:18px;">
                    <label style="display:block; margin-bottom:6px; font-weight:600; font-size:0.82rem; color:var(--text-secondary);">Content Body</label>
                    <textarea id="form-content" rows="10" class="form-input" style="resize:vertical;" required></textarea>
                </div>
                <div class="form-group" style="margin-bottom:22px;">
                    <label style="display:flex; align-items:center; gap:8px; cursor:pointer; font-weight:500; font-size:0.85rem;">
                        <input type="checkbox" id="form-published" checked style="width:16px; height:16px; accent-color:var(--primary);">
                        <span>Mark as Published</span>
                    </label>
                </div>
                <div style="display:flex; justify-content:flex-end; gap:10px;">
                    <button type="button" class="btn btn-light" onclick="closeModal()">Discard</button>
                    <button type="submit" class="btn btn-primary" id="save-btn" style="min-width:130px;">Publish Changes</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
