<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users - PrimeReport</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/prime.css">
    <link rel="stylesheet" href="../css/admin.css">
    <script type="module" src="../js/auth-check.js"></script>
</head>
<body class="admin-body">
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
        <div class="logo">
            <img src="../logo.png" alt="PrimeReport" style="height: 40px; margin-bottom: 10px;" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
            <h2 style="display:none; color: white;">Prime<span style="color:var(--primary-color)">Admin</span></h2>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li><a href="index.html"><i class="fas fa-home"></i> Dashboard</a></li>
                <li><a href="articles.html"><i class="fas fa-newspaper"></i> Articles</a></li>
                <li><a href="categories.html"><i class="fas fa-list"></i> Categories</a></li>
                <li><a href="users.html" class="active"><i class="fas fa-users"></i> Users</a></li>
                <li><a href="analytics.html"><i class="fas fa-chart-line"></i> Analytics</a></li>
                <li><a href="ads.html"><i class="fas fa-ad"></i> Advertisements</a></li>
                <li><a href="rss.html"><i class="fas fa-rss"></i> RSS Controls</a></li>
                <li><a href="ai-settings.html"><i class="fas fa-robot"></i> AI Engine</a></li>
                <li><a href="settings.html"><i class="fas fa-cog"></i> Settings</a></li>
                <li class="mt-5"><a href="#" id="logout-btn"><i class="fas fa-sign-out-alt"></i> Logout</a></li>
            </ul>
        </nav>
    </aside>

    <!-- Main Content -->
    <main class="admin-main">
        <header class="admin-header">
            <div style="display:flex; align-items:center;">
                <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                    <i class="fas fa-bars"></i>
                </button>
                <div class="header-left">
                    <p>User Management</p>
                    <h2>Users</h2>
                </div>
            </div>
            <div class="header-right">
                <button class="header-icon-btn" title="Notifications">
                    <i class="fas fa-bell"></i>
                    <span class="notif-badge">3</span>
                </button>
                <div class="user-profile">
                    <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff&bold=true&size=64" alt="Avatar">
                    <span>Administrator</span>
                    <i class="fas fa-chevron-down"></i>
                </div>
            </div>
        </header>

        <section class="admin-content">
            <div class="content-card">
                <div class="card-header">
                    <h3>Users List</h3>
                    <div class="card-actions">
                        <button class="btn btn-primary" onclick="openUserModal()">
                            <i class="fas fa-user-plus"></i> Add User
                        </button>
                    </div>
                </div>

                <div class="table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Email/Username</th>
                                <th>Role</th>
                                <th>Status</th>
                                <th>Last Login</th>
                                <th>Actions</th>
                            </tr>
                        </thead>
                        <tbody id="users-table-body">
                            <!-- Injected by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </section>
    </main>
</div>

    <!-- Modal -->
    <div id="user-modal" class="modal" style="display:none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="user-modal-title">Add User</h3>
                <button onclick="closeUserModal()" style="background:none; border:none; font-size:1.5rem; cursor:pointer;">&times;</button>
            </div>
            <form id="user-form" style="padding-top:10px;">
                <input type="hidden" id="user-id">
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="user-name" required class="form-input" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;">
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="user-email" required class="form-input" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div class="form-group">
                        <label>Username (Login ID)</label>
                        <input type="text" id="user-username" required class="form-input" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;">
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="text" id="user-password" required class="form-input" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;">
                    </div>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; margin-bottom:15px;">
                    <div class="form-group">
                        <label>Role</label>
                        <select id="user-role" class="form-input" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;" required>
                            <option value="Admin">Admin</option>
                            <option value="Editor">Editor</option>
                            <option value="Author">Author</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Status</label>
                        <select id="user-status" class="form-input" style="width:100%; padding:10px; border-radius:5px; border:1px solid #ddd;" required>
                            <option value="Active">Active</option>
                            <option value="Disabled">Disabled</option>
                        </select>
                    </div>
                </div>
                <div class="mt-4" style="text-align:right;">
                    <button type="button" class="btn" style="background:#eee; margin-right:10px;" onclick="closeUserModal()">Cancel</button>
                    <button type="submit" class="btn btn-primary">Save User</button>
                </div>
            </form>
        </div>
    </div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
