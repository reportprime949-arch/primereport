<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Article Queue - PrimeAdmin</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- CSS -->
    <link rel="stylesheet" href="../css/prime.css">
    <link rel="stylesheet" href="../css/admin.css">
    <script type="module" src="../js/auth-check.js"></script>
    <style>
        .queue-item { display: flex; flex-direction: column; gap: 15px; border-bottom: 1px solid #eee; padding-bottom: 15px; margin-bottom:15px; }
        .queue-header { display: flex; justify-content: space-between; align-items:flex-start; }
        .queue-body { font-size: 0.9em; color: #555; }
        .queue-actions { display: flex; gap: 10px; }
        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        .status-draft { background-color: #ffeb3b; color: #f57f17; }
        .status-pending { background-color: #e3f2fd; color: #1976d2; }
    </style>
</head>
<body class="admin-body">
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar" id="admin-sidebar">
            <div class="logo">
                <img src="../logo.png" alt="PrimeReport" onerror="this.style.display='none'; this.nextElementSibling.style.display='block';">
                <h2 style="display:none;">Prime<span>Report</span></h2>
            </div>
            <nav class="sidebar-nav">
                <ul>
                    <li><a href="index.html"><i class="fas fa-th-large"></i> <span>Dashboard</span></a></li>
                    <li><a href="articles.html"><i class="fas fa-newspaper"></i> <span>Articles</span></a></li>
                    <li><a href="categories.html"><i class="fas fa-folder"></i> <span>Categories</span></a></li>
                    <li><a href="users.html"><i class="fas fa-users"></i> <span>Users</span></a></li>
                    <li><a href="queue.html" class="active"><i class="fas fa-list-check"></i> <span>Article Queue</span></a></li>
                    <li><a href="analytics.html"><i class="fas fa-chart-line"></i> <span>Analytics</span></a></li>
                    <li><a href="ads.html"><i class="fas fa-rectangle-ad"></i> <span>Advertisements</span></a></li>
                    <li><a href="rss.html"><i class="fas fa-rss"></i> <span>RSS Controls</span></a></li>
                    <li><a href="ai-settings.html"><i class="fas fa-robot"></i> <span>AI Engine</span></a></li>
                    <li><a href="settings.html"><i class="fas fa-gear"></i> <span>Settings</span></a></li>
                    <li class="mt-5"><a href="#" id="logout-btn"><i class="fas fa-right-from-bracket"></i> <span>Logout</span></a></li>
                </ul>
            </nav>
        </aside>

        <main class="admin-main">
            <header class="admin-header">
                <div style="display:flex; align-items:center;">
                    <button class="sidebar-toggle" onclick="toggleSidebar()" aria-label="Toggle sidebar">
                        <i class="fas fa-bars"></i>
                    </button>
                    <div class="header-left">
                        <p>Automation</p>
                        <h2>Article Queue</h2>
                    </div>
                </div>
                <div class="header-right">
                    <button class="header-icon-btn" title="Notifications">
                        <i class="fas fa-bell"></i>
                        <span class="notif-badge">3</span>
                    </button>
                    <div class="user-profile">
                        <img src="https://ui-avatars.com/api/?name=Admin&background=2563eb&color=fff&bold=true&size=64" alt="Avatar">
                        <span>Administrator</span>
                        <i class="fas fa-chevron-down"></i>
                    </div>
                </div>
            </header>

        <section class="admin-content">
            <div class="content-card">
                <div class="card-header" style="display: flex; justify-content: space-between; align-items: center;">
                    <h3>Pending Articles</h3>
                    <button class="btn btn-secondary" onclick="loadQueue()"><i class="fas fa-sync"></i> Refresh</button>
                </div>
                
                <div id="queue-container" style="padding: 20px;">
                    <!-- Queue injected here -->
                    <div style="text-align: center; color: #888;">Loading article queue...</div>
                </div>
            </div>
        </section>
    </main>
</div>

    <script type="module" src="../js/admin.js"></script>
</body>
</html>
